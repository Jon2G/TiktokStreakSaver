name: iOS Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/TiktokStreakSaver/TiktokStreakSaver.csproj'
  ALTSTORE_JSON: 'dist/altstore/source.json'

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build native StreakEngine & extension
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          chmod +x src/ios/build.sh scripts/ensure-ios-native-built.sh
          ./src/ios/build.sh

      - name: Import signing certificate
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" ]; then
            echo "Skipping signing import — IOS_DISTRIBUTION_CERTIFICATE_BASE64 not set"
            exit 0
          fi
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          if [ -n "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/main.mobileprovision
          fi
          if [ -n "$IOS_EXTENSION_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$IOS_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/extension.mobileprovision
          fi

      - name: Publish iOS IPA
        run: |
          dotnet publish "$PROJECT_PATH" -f net9.0-ios -c Release \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:SkipIosNativeBuild=true \
            -o ./artifacts/ios

      - name: Collect IPA artifact
        run: |
          mkdir -p release-out
          find . -name "*.ipa" -maxdepth 6 -exec cp {} release-out/StreakSaver.ipa \;
          ls -la release-out || true

      - name: Update AltStore source JSON
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/StreakSaver.ipa"
          SIZE=$(stat -f%z release-out/StreakSaver.ipa 2>/dev/null || stat -c%s release-out/StreakSaver.ipa 2>/dev/null || echo 0)
          python3 - <<PY
          import json, datetime
          path = "${{ env.ALTSTORE_JSON }}"
          with open(path) as f:
              data = json.load(f)
          app = data["apps"][0]
          app["version"] = "$VERSION"
          app["buildVersion"] = "$VERSION".replace(".", "")
          app["downloadURL"] = "$IPA_URL"
          app["size"] = int("$SIZE")
          app["versionDate"] = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          data["sourceURL"] = "https://raw.githubusercontent.com/Jon2G/TiktokStreakSaver/main/dist/altstore/source.json"
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-out/StreakSaver.ipa
            dist/altstore/source.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: release-out/
          if-no-files-found: warn
