name: iOS Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '9.0.203'
  PROJECT_PATH: 'src/TiktokStreakSaver/TiktokStreakSaver.csproj'
  ALTSTORE_JSON: 'dist/altstore/source.json'

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Verify .NET SDK
        run: dotnet --info

      - name: Install MAUI iOS workload
        run: |
          dotnet workload install maui-ios
          dotnet workload list

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install iOS signing certificate and profiles
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          chmod +x scripts/install-ios-signing-ci.sh
          ./scripts/install-ios-signing-ci.sh

      - name: Build native StreakEngine & extension
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          IOS_MAIN_PROFILE_NAME: ${{ env.IOS_MAIN_PROFILE_NAME }}
          IOS_EXTENSION_PROFILE_NAME: ${{ env.IOS_EXTENSION_PROFILE_NAME }}
        run: |
          chmod +x src/ios/build.sh scripts/ensure-ios-native-built.sh
          ./src/ios/build.sh

      - name: Publish iOS IPA
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
        run: |
          chmod +x scripts/sync-ios-provisioning-profiles.sh scripts/ensure-main-ios-profile.sh
          ./scripts/sync-ios-provisioning-profiles.sh
          ./scripts/ensure-main-ios-profile.sh
          dotnet publish "$PROJECT_PATH" -f net9.0-ios -c Release \
            -p:TargetFrameworks=net9.0-ios \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:DevelopmentTeam="$DEVELOPMENT_TEAM" \
            -p:CodesignEntitlements=Platforms/iOS/Entitlements.plist \
            -p:SkipIosNativeBuild=true \
            -o ./artifacts/ios

      - name: Collect IPA artifact
        run: |
          mkdir -p release-out
          find . -name "*.ipa" -maxdepth 6 -exec cp {} release-out/StreakSaver.ipa \;
          ls -la release-out || true

      - name: Update AltStore source JSON
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/StreakSaver.ipa"
          SIZE=$(stat -f%z release-out/StreakSaver.ipa 2>/dev/null || stat -c%s release-out/StreakSaver.ipa 2>/dev/null || echo 0)
          python3 - <<PY
          import json, datetime
          path = "${{ env.ALTSTORE_JSON }}"
          with open(path) as f:
              data = json.load(f)
          app = data["apps"][0]
          app.pop("marketplaceID", None)
          app["version"] = "$VERSION"
          app["buildVersion"] = "$VERSION".replace(".", "")
          app["downloadURL"] = "$IPA_URL"
          app["size"] = int("$SIZE")
          app["versionDate"] = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          data["sourceURL"] = "https://raw.githubusercontent.com/Jon2G/TiktokStreakSaver/main/dist/altstore/source.json"
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-out/StreakSaver.ipa
            dist/altstore/source.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: release-out/
          if-no-files-found: warn
