name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/TiktokStreakSaver/**'
      - 'global.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/TiktokStreakSaver/**'
      - 'global.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_PATH: src/TiktokStreakSaver/TiktokStreakSaver.csproj

jobs:
  build:
    name: Build MAUI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: global.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -f net9.0-android -c Debug -p:SkipIosNativeBuild=true
